<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found. Edge Within</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A0A0A; color: #fff; font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
  .wrap { max-width: 480px; }
  .num { font-size: 96px; font-weight: 700; color: #b8860b; line-height: 1; font-family: Georgia, serif; }
  h1 { font-size: 24px; color: #fff; margin: 16px 0 10px; }
  p { font-size: 15px; color: #888; line-height: 1.7; margin-bottom: 32px; }
  a { display: inline-block; background: #b8860b; color: #0A0A0A; font-weight: 700; font-size: 13px; padding: 13px 28px; border-radius: 6px; text-decoration: none; letter-spacing: 0.06em; text-transform: uppercase; font-family: 'Courier New', monospace; }
</style>
</head>
<body>
<div class="wrap">
  <div class="num">404</div>
  <h1>Page not found.</h1>
  <p>The page you're looking for doesn't exist. Head back to the home page.</p>
  <a href="/">Back to Home</a>
</div>
</body>
</html>
